# ---------------------------------------------------------------------------
# Example user-defined collection: Post
# Illustrates the pattern for any collection with versioning enabled.
# ---------------------------------------------------------------------------

"""
Example collection type. In a real Payload deployment, all fields are
generated from the collection's field definitions.
"""
type Post {
  id: String
  title: String
  content: JSON
  author: User
  status: String
  publishedAt: String
  updatedAt: String
  createdAt: String
}

"""
Version wrapper for a versioned collection document.
Generated when versions are enabled on a collection.
"""
type PostVersion {
  id: String
  version: Post
  createdAt: String
  updatedAt: String
}

type versionsPost {
  docs: [PostVersion!]!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  limit: Int!
  nextPage: Int
  offset: Int
  page: Int!
  pagingCounter: Int!
  prevPage: Int
  totalDocs: Int!
  totalPages: Int!
}

# ---------------------------------------------------------------------------
# Example user-defined global: Header
# Illustrates the pattern for any global.
# ---------------------------------------------------------------------------

"""
Example global type. In a real Payload deployment, fields come from the
