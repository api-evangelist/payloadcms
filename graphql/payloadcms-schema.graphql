  updatedAt: String
  createdAt: String
}

type Header_NavItem {
  label: String
  link: String
}

# ---------------------------------------------------------------------------
# Root Query type
# ---------------------------------------------------------------------------

"""
Root Query.
Built-in fields are always present; per-collection and per-global fields
are added dynamically based on the Payload configuration.

Pattern per collection (singular=Post, plural=Posts):
  Post(id: String!, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, select: Boolean, trash: Boolean): Post
  Posts(where: PostWhereInput, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, limit: Int, page: Int, pagination: Boolean, select: Boolean, sort: String, trash: Boolean): Posts
  countPosts(where: PostWhereInput, draft: Boolean, locale: LocaleInputType, trash: Boolean): countPosts
  docAccessPost(id: String!): PostDocAccess
  mePost: PostMe                        # auth collections only
  initializedPost: Boolean              # auth collections only
  versionPost(id: String, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, trash: Boolean): PostVersion   # versioned only
  versionsPosts(where: ..., limit: Int, page: Int, sort: String, ...): versionsPosts                                                       # versioned only

Pattern per global (name=Header):
  Header(draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, select: Boolean): Header
  docAccessHeader: HeaderDocAccess

Built-in queries:
  Access: Access           — returns the full policy/permission tree for all collections and globals
  Preference(key: String!): PayloadPreference   — returns a single user preference (requires auth)
"""
type Query {
  # Built-in: access policy tree
  Access: Access

  # Built-in: user preferences (requires Authorization header)
  Preference(key: String!): PayloadPreference

  # Built-in: Users collection
  User(id: String!, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, select: Boolean, trash: Boolean): User
  Users(where: UserWhereInput, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, limit: Int, page: Int, pagination: Boolean, select: Boolean, sort: String, trash: Boolean): Users
  countUsers(where: UserWhereInput, draft: Boolean, locale: LocaleInputType, trash: Boolean): countUsers
  docAccessUser(id: String!): UserDocAccess
  meUser: usersMe
  initializedUser: Boolean

  # Built-in: PayloadPreference collection
  PayloadPreference(id: String!, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, select: Boolean, trash: Boolean): PayloadPreference
  PayloadPreferences(where: PayloadPreferenceWhereInput, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, limit: Int, page: Int, pagination: Boolean, select: Boolean, sort: String, trash: Boolean): PayloadPreferences
  countPayloadPreferences(where: PayloadPreferenceWhereInput, draft: Boolean, locale: LocaleInputType, trash: Boolean): countPayloadPreferences
  docAccessPayloadPreference(id: String!): PayloadPreferenceDocAccess

  # Example: user-defined Post collection (versioned)
  Post(id: String!, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, select: Boolean, trash: Boolean): Post
  Posts(where: PostWhereInput, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, limit: Int, page: Int, pagination: Boolean, select: Boolean, sort: String, trash: Boolean): Posts
  countPosts(where: PostWhereInput, draft: Boolean, locale: LocaleInputType, trash: Boolean): countPosts
  docAccessPost(id: String!): PostDocAccess
  versionPost(id: String, draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, trash: Boolean): PostVersion
  versionsPosts(where: versionsPostWhereInput, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, limit: Int, page: Int, pagination: Boolean, select: Boolean, sort: String, trash: Boolean): versionsPost

  # Example: user-defined Header global
  Header(draft: Boolean, locale: LocaleInputType, fallbackLocale: FallbackLocaleInputType, select: Boolean): Header
  docAccessHeader: HeaderDocAccess
}

# ---------------------------------------------------------------------------
# Root Mutation type
# ---------------------------------------------------------------------------

"""
Root Mutation.
Per-collection mutations follow this pattern (singular=Post):
  createPost(data: mutationPostInput, draft: Boolean, locale: LocaleInputType): Post
  updatePost(id: String!, data: mutationPostUpdateInput, autosave: Boolean, draft: Boolean, locale: LocaleInputType, trash: Boolean): Post
  deletePost(id: String!, trash: Boolean): Post
  duplicatePost(id: String!, data: mutationPostInput): Post          # unless disableDuplicate: true
  restoreVersionPost(id: String, draft: Boolean): Post               # versioned only

Auth collection mutations (singular=User):
  loginUser(email: String!, password: String): usersLoginResult
  logoutUser(allSessions: Boolean): String
  refreshTokenUser: usersRefreshedUser
  forgotPasswordUser(email: String!): Boolean!
  resetPasswordUser(password: String, token: String): usersResetPassword
  verifyEmailUser(token: String): Boolean
  unlockUser(email: String!): Boolean!

Global mutations (name=Header):
  updateHeader(data: mutationHeaderInput, draft: Boolean, locale: LocaleInputType): Header
  restoreVersionHeader(id: String, draft: Boolean): Header           # versioned globals only

Preference mutations:
  updatePreference(key: String!, value: JSON): PayloadPreference
  deletePreference(key: String!): PayloadPreference
"""
type Mutation {
  # Built-in: Users collection (auth)
  createUser(data: mutationUserInput!, draft: Boolean, locale: LocaleInputType): User
  updateUser(id: String!, data: mutationUserUpdateInput, autosave: Boolean, draft: Boolean, locale: LocaleInputType, trash: Boolean): User
  deleteUser(id: String!, trash: Boolean): User
  loginUser(email: String!, password: String): usersLoginResult
  logoutUser(allSessions: Boolean): String
  refreshTokenUser: usersRefreshedUser
  forgotPasswordUser(email: String!): Boolean!
  resetPasswordUser(password: String, token: String): usersResetPassword
  verifyEmailUser(token: String): Boolean
  unlockUser(email: String!): Boolean!

  # Built-in: PayloadPreference collection
  createPayloadPreference(data: mutationPayloadPreferenceInput, draft: Boolean): PayloadPreference
  updatePayloadPreference(id: String!, data: mutationPayloadPreferenceUpdateInput, autosave: Boolean, draft: Boolean, trash: Boolean): PayloadPreference
  deletePayloadPreference(id: String!, trash: Boolean): PayloadPreference

  # Built-in: Preference shorthand (used by admin panel)
  updatePreference(key: String!, value: JSON): PayloadPreference
  deletePreference(key: String!): PayloadPreference

  # Example: user-defined Post collection (versioned)
  createPost(data: mutationPostInput, draft: Boolean, locale: LocaleInputType): Post
  updatePost(id: String!, data: mutationPostUpdateInput, autosave: Boolean, draft: Boolean, locale: LocaleInputType, trash: Boolean): Post
  deletePost(id: String!, trash: Boolean): Post
  duplicatePost(id: String!, data: mutationPostInput): Post
  restoreVersionPost(id: String, draft: Boolean): Post

  # Example: user-defined Header global
  updateHeader(data: mutationHeaderInput, draft: Boolean, locale: LocaleInputType): Header
}

