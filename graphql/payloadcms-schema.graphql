# Payload CMS GraphQL Schema
#
# IMPORTANT: Payload CMS generates its GraphQL schema dynamically at startup from
# the user-defined collection and global configurations. There is no single static
# schema file — the actual schema varies per deployment based on which collections
# and globals are configured.
#
# This document captures:
#   1. The framework-level generation patterns (confirmed from source code in
#      packages/graphql/src/schema/ and packages/graphql/src/resolvers/)
#   2. The built-in collections that every Payload app includes (users, payload-preferences)
#   3. Concrete example types for a typical app with a "Post" collection and "Header" global
#   4. All shared infrastructure types (pagination, policy/access, locale, where-input operators)
#
# Source references:
#   packages/graphql/src/index.ts                    — configToSchema() entry point
#   packages/graphql/src/schema/initCollections.ts   — per-collection query/mutation wiring
#   packages/graphql/src/schema/initGlobals.ts       — per-global query/mutation wiring
#   packages/graphql/src/schema/buildPaginatedListType.ts
#   packages/graphql/src/schema/buildPoliciesType.ts
#   packages/graphql/src/schema/buildLocaleInputType.ts
#   packages/graphql/src/schema/buildFallbackLocaleInputType.ts
#   packages/graphql/src/schema/operators.ts
#   packages/payload/src/preferences/config.ts
#   packages/payload/src/database/migrations/migrationsCollection.ts (graphQL: false — not exposed)

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

"""
JSON scalar — stores arbitrary JSON data (used for preference values,
richtext, and json field types). Provided by graphql-type-json.
"""
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

"""
Locale codes available for localized content queries.
Values are determined by the localization.locales config array.
This enum only exists when localization is enabled in the Payload config.
Example values shown; actual values depend on the deployment configuration.
"""
enum LocaleInputType {
  en
  es
  fr
  de
}

"""
Fallback locale for localized content queries when the requested locale
has no content. Includes all locale codes plus the special value 'none'.
Only exists when localization is enabled.
"""
enum FallbackLocaleInputType {
  en
  es
  fr
  de
  none
}

# ---------------------------------------------------------------------------
# Pagination (built from buildPaginatedListType.ts)
# ---------------------------------------------------------------------------

"""
Paginated list wrapper generated for every collection's find operation.
Named after the collection's plural label (e.g. Posts, Users, MediaItems).
"""
type Posts {
  docs: [Post!]!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  limit: Int!
  nextPage: Int
  offset: Int
  page: Int!
  pagingCounter: Int!
  prevPage: Int
  totalDocs: Int!
  totalPages: Int!
}

"""
Count result type generated for every collection's count operation.
Named count{PluralName}.
"""
type countPosts {
  totalDocs: Int
}

# ---------------------------------------------------------------------------
# Built-in: Users collection (slug: "users", auth: true)
# Generated names: User / Users based on default slug "users"
# ---------------------------------------------------------------------------

"""
Default auth-enabled Users collection. Every Payload app includes this
unless overridden. Fields beyond id/email/updatedAt/createdAt depend on
the project's user collection field configuration.
"""
type User {
  id: String
  email: String
  updatedAt: String
  createdAt: String
}

type Users {
  docs: [User!]!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  limit: Int!
  nextPage: Int
  offset: Int
  page: Int!
  pagingCounter: Int!
  prevPage: Int
  totalDocs: Int!
  totalPages: Int!
}

countUsers {
  totalDocs: Int
}

"""
JWT payload type for the Users collection.
Contains fields marked saveToJWT plus email and collection name.
"""
type usersJWT {
  email: String!
  collection: String!
}

"""
Me query result for the Users collection.
"""
type usersMe {
  collection: String
  exp: Int
  strategy: String
  token: String
  user: User
}

"""
Login result for the Users collection.
"""
type usersLoginResult {
  exp: Int
  token: String
  user: User
}

"""
Token refresh result for the Users collection.
"""
type usersRefreshedUser {
  exp: Int
  refreshedToken: String
  strategy: String
  user: usersJWT
}

"""
Password reset result for the Users collection.
"""
type usersResetPassword {
  token: String
  user: User
}

# ---------------------------------------------------------------------------
# Built-in: PayloadPreferences collection (slug: "payload-preferences")
# Generated names: PayloadPreference / PayloadPreferences
# Note: access is restricted to the authenticated user's own preferences.
# ---------------------------------------------------------------------------

"""
Payload admin panel preference record.
Stores per-user UI preferences keyed by an arbitrary string.
"""
type PayloadPreference {
  id: String
  user: PayloadPreference_User_Relationship
  key: String
  value: JSON
  updatedAt: String
  createdAt: String
}

"""
Polymorphic relationship to whichever auth-enabled collections exist.
"""
type PayloadPreference_User_Relationship {
  relationTo: String
  value: JSON
}

type PayloadPreferences {
  docs: [PayloadPreference!]!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  limit: Int!
  nextPage: Int
  offset: Int
  page: Int!
  pagingCounter: Int!
  prevPage: Int
  totalDocs: Int!
  totalPages: Int!
}

