# ---------------------------------------------------------------------------
# Where-input types (generated by buildWhereInputType.ts)
# Each filterable field gets operator sub-inputs based on its type.
# The operators available are defined in schema/operators.ts:
#   equality: equals, not_equals
#   comparison: greater_than_equal, greater_than, less_than_equal, less_than
#   contains: in, not_in, all
#   partial: like, contains
#   geo: near
#   geojson: within, intersects
# ---------------------------------------------------------------------------

input UserWhereInput {
  id:        User_id_operator
  email:     User_email_operator
  updatedAt: User_updatedAt_operator
  createdAt: User_createdAt_operator
  AND:       [UserWhereInput]
  OR:        [UserWhereInput]
}

input User_id_operator {
  equals:     String
  not_equals: String
  in:         [String]
  not_in:     [String]
  all:        [String]
  like:       String
  contains:   String
  exists:     Boolean
}

input User_email_operator {
  equals:     String
  not_equals: String
  like:       String
  contains:   String
  in:         [String]
  not_in:     [String]
  all:        [String]
  exists:     Boolean
}

input User_updatedAt_operator {
  equals:               String
  not_equals:           String
  greater_than_equal:   String
  greater_than:         String
  less_than_equal:      String
  less_than:            String
  exists:               Boolean
}

input User_createdAt_operator {
  equals:               String
  not_equals:           String
  greater_than_equal:   String
  greater_than:         String
  less_than_equal:      String
  less_than:            String
  exists:               Boolean
}

input PayloadPreferenceWhereInput {
  id:        PayloadPreference_id_operator
  key:       PayloadPreference_key_operator
  updatedAt: PayloadPreference_updatedAt_operator
  createdAt: PayloadPreference_createdAt_operator
  AND:       [PayloadPreferenceWhereInput]
  OR:        [PayloadPreferenceWhereInput]
}

input PayloadPreference_id_operator {
  equals:     String
  not_equals: String
  in:         [String]
  not_in:     [String]
  all:        [String]
  exists:     Boolean
}

input PayloadPreference_key_operator {
  equals:     String
  not_equals: String
  like:       String
  contains:   String
  in:         [String]
  not_in:     [String]
  all:        [String]
  exists:     Boolean
}

input PayloadPreference_updatedAt_operator {
  equals:             String
  not_equals:         String
  greater_than_equal: String
