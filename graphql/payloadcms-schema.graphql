# Access / Policy types (built from buildPoliciesType.ts)
# The root Access query returns the global policy object.
# Each collection and global gets a <Slug>Access type with per-operation
# permission booleans and optional where-clause JSON, plus a fields subtree.
# ---------------------------------------------------------------------------

"""
Top-level access policy returned by the Access query.
Contains canAccessAdmin and one entry per collection/global slug.
"""
type Access {
  canAccessAdmin: Boolean!
  users: UsersAccess
  payloadPreferences: PayloadPreferencesAccess
  # ... one field per collection/global defined in the Payload config
}

"""
Per-operation permission booleans for the Users collection.
"""
